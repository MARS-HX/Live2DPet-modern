<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Window</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; font-family:'Microsoft YaHei',sans-serif; }
#chat-container {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    background:rgba(255,255,255,0.95);
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.1);
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
    overflow:hidden;
}
#drag-bar {
    padding:6px 10px;
    background:#f8f8f8;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:#666;
    cursor:move;
    -webkit-app-region:drag;
}
#drag-bar .title { display:flex; align-items:center; gap:6px; }
#drag-bar .controls { display:flex; gap:4px; -webkit-app-region:no-drag; }
.mode-badge {
    font-size:10px; padding:1px 8px; border-radius:8px; cursor:pointer; -webkit-app-region:no-drag;
}
.mode-companion .mode-badge { background:#e8f5e9; color:#2e7d32; }
.mode-tavern .mode-badge { background:#fff3e0; color:#e65100; }
.ctrl-btn {
    border:none; background:none; cursor:pointer; font-size:13px; padding:0 4px; color:#999;
}
.ctrl-btn:hover { color:#e75480; }
#chat-messages {
    flex:1; overflow-y:auto; padding:8px; font-size:13px; line-height:1.6;
    background:rgba(255,255,255,0.9);
}
.msg { margin:4px 0; word-break:break-word; }
.msg.user { color:#333; text-align:right; }
.msg.ai { color:#e75480; text-align:left; }
.msg-time { font-size:9px; color:#bbb; display:block; }
.msg.user .msg-time { text-align:right; }
.msg.ai .msg-time { text-align:left; }
#typing-indicator { display:none; font-size:11px; color:#e75480; padding:2px 8px; }
#typing-indicator.show { display:block; }
#input-row {
    display:flex; gap:4px; padding:6px 8px;
    background:rgba(255,255,255,0.95);
    border-top:1px solid #eee;
}
#chat-input {
    flex:1; border:1px solid #ddd; border-radius:16px; padding:6px 12px;
    font-size:13px; outline:none;
}
#chat-input:focus { border-color:#e75480; }
.chat-btn {
    border:none; border-radius:50%; width:30px; height:30px;
    cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
    transition:background 0.2s;
}
#btn-send { background:#e75480; color:white; }
#btn-mic { background:rgba(255,255,255,0.8); color:#555; border:1px solid #ddd; }
#btn-mic:hover { background:rgba(255,255,255,1); }
#btn-mic.listening { background:#ff4444; color:white; animation:pulse 1s infinite; }
@keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
</style>
</head>
<body>
<div id="chat-container">
    <div id="drag-bar">
        <span class="title"><span id="mode-icon">🐱</span> <span id="mode-label">陪伴模式</span></span>
        <span class="controls">
            <span class="mode-badge" id="mode-toggle" title="切换模式">切换</span>
            <button class="ctrl-btn" id="btn-minimize" title="最小化">─</button>
            <button class="ctrl-btn" id="btn-close" title="关闭">✕</button>
        </span>
    </div>
    <div id="typing-indicator">💭 正在输入...</div>
    <div id="chat-messages"></div>
    <div id="input-row">
        <input id="chat-input" type="text" placeholder="说点什么..." maxlength="500">
        <button class="chat-btn" id="btn-mic" title="语音">🎤</button>
        <button class="chat-btn" id="btn-send" title="发送">➤</button>
    </div>
</div>
<script src="src/core/ai-chat.js"></script>
<script src="src/core/conversation-store.js"></script>
<script>
let chatAiClient = null;
let chatStore = null;
let chatMode = 'companion';

async function init() {
    chatStore = new ConversationStore();
    await chatStore.load();
    window.__chatStore = chatStore;
    appendMessage('ai', '👋 你好呀！有什么想聊的吗？');
    
    // IPC 监听
    if (window.electronAPI) {
        window.electronAPI.onReceiveMessage?.((msg) => {
            if (msg && msg.text) appendMessage(msg.role || 'ai', msg.text);
        });
    }
}

function appendMessage(role, text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const span = document.createElement('span');
    span.textContent = text;
    div.appendChild(span);
    const time = document.createElement('span');
    time.className = 'msg-time';
    const now = new Date();
    time.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    div.appendChild(time);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showTyping(show) {
    document.getElementById('typing-indicator').classList.toggle('show', show);
}

async function sendMessage(text) {
    if (!text || !text.trim()) return;
    const msg = text.trim();
    document.getElementById('chat-input').value = '';
    appendMessage('user', msg);
    if (chatStore) await chatStore.add('user', msg);
    showTyping(true);
    try {
        if (!chatAiClient) {
            chatAiClient = new AIChatClient();
            await chatAiClient.init();
            window.__chatAiClient = chatAiClient;
        }
        let memoryContext = '';
        if (chatStore) {
            const enhanced = chatStore.getEnhancedContext(5);
            if (enhanced) memoryContext = '\n\n[长期记忆]\n' + enhanced;
        }
        const msgs = [
            { role: 'system', content: '你是一个可爱的桌面宠物，用活泼简短的方式回答。' + memoryContext },
            { role: 'user', content: msg }
        ];
        const reply = await chatAiClient.callAPI(msgs);
        showTyping(false);
        appendMessage('ai', reply);
        if (chatStore) await chatStore.add('assistant', reply);
        // TTS
        if (window.electronAPI?.ttsSynthesize) {
            try {
                const tts = await window.electronAPI.ttsSynthesize(reply);
                if (tts?.success) new Audio('data:audio/wav;base64,' + tts.wav).play().catch(()=>{});
            } catch(e) {}
        }
    } catch(e) {
        showTyping(false);
        appendMessage('ai', '😅 ' + e.message);
    }
}

document.getElementById('btn-send').addEventListener('click', () => sendMessage(document.getElementById('chat-input').value));
document.getElementById('chat-input').addEventListener('keydown', (e) => { if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(e.target.value); }});
document.getElementById('btn-close').addEventListener('click', () => window.close());
document.getElementById('btn-minimize').addEventListener('click', () => window.electronAPI?.minimizeWindow?.());

init();
</script>
</body>
</html>
