<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Desktop Pet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }
        #pet-container {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #live2d-canvas {
            position: absolute; top: 0; left: 0;
            -webkit-app-region: no-drag;
        }
        #static-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: auto;
            transform-origin: top center;
            display: none;
            -webkit-app-region: no-drag;
        }
        #placeholder {
            max-width: 80%; max-height: 80%;
            object-fit: contain;
            display: none;
        }
        .controls {
            position: absolute; bottom: 5px; right: 5px;
            display: flex; gap: 3px;
            -webkit-app-region: no-drag;
            opacity: 0; transition: opacity 0.3s;
            z-index: 100;
        }
        #pet-container:hover .controls { opacity: 1; }
        .ctrl-btn {
            width: 24px; height: 24px;
            border: none; border-radius: 50%;
            background: rgba(255,255,255,0.8);
            cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,1); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: default; }

        /* ===== 聊天框样式（可拖动 + 置顶） ===== */
        #chat-overlay {
            position: absolute; top: 5px; left: 5px;
            width: 280px; z-index: 200;
            display: none; flex-direction: column;
            -webkit-app-region: no-drag;
            font-family: 'Microsoft YaHei', sans-serif;
            cursor: default;
            max-height: calc(100% - 100px);
        }
        #chat-overlay.show { display: flex; }
        #chat-drag-handle {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.1);
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            padding: 4px 8px;
            font-size: 11px;
            color: #999;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: no-drag;
            user-select: none;
        }
        #chat-drag-handle .chat-mode-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            cursor: pointer;
        }
        .mode-companion #chat-drag-handle .chat-mode-badge {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .mode-tavern #chat-drag-handle .chat-mode-badge {
            background: #fff3e0;
            color: #e65100;
        }
        #chat-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #999;
            padding: 0 4px;
            line-height: 1;
        }
        #chat-close-btn:hover { color: #e75480; }
        #chat-messages {
            background: rgba(255,255,255,0.92);
            padding: 8px; max-height: 200px; overflow-y: auto;
            font-size: 12px; line-height: 1.5;
            border-left: 1px solid rgba(0,0,0,0.1);
            border-right: 1px solid rgba(0,0,0,0.1);
            flex: 1;
            min-height: 50px;
        }
        #chat-messages .msg { margin: 2px 0; word-break: break-all; }
        #chat-messages .msg.user { color: #333; text-align: right; }
        #chat-messages .msg.ai { color: #e75480; text-align: left; }
        #chat-input-row {
            display: flex; gap: 2px;
            background: rgba(255,255,255,0.95);
            border-radius: 0 0 10px 10px;
            padding: 4px 6px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        #chat-input {
            flex: 1; border: 1px solid #ddd; border-radius: 12px;
            padding: 4px 10px; font-size: 12px; outline: none;
            -webkit-app-region: no-drag;
        }
        #chat-input:focus { border-color: #e75480; }
        .chat-btn {
            border: none; border-radius: 50%;
            width: 26px; height: 26px;
            cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            -webkit-app-region: no-drag;
            transition: background 0.2s;
        }
        #btn-send { background: #e75480; color: white; }
        #btn-send:hover { background: #d4446a; }
        #btn-mic {
            background: rgba(255,255,255,0.8); color: #555;
            border: 1px solid #ddd;
        }
        #btn-mic:hover { background: rgba(255,255,255,1); }
        #btn-mic.listening { background: #ff4444; color: white; border-color: #ff4444; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #btn-chat-toggle {
            background: rgba(255,255,255,0.8); color: #555;
            border: 1px solid #ddd;
        }
        #btn-chat-toggle:hover { background: rgba(255,255,255,1); }
        #btn-chat-toggle.active { background: #e75480; color: white; border-color: #e75480; }
        /* ===== 日记弹窗 ===== */
        #diary-popup {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        #diary-popup.show { display: flex; }
        #diary-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            max-height: 500px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.8;
            color: #333;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            position: relative;
            font-family: 'Microsoft YaHei', 'KaiTi', serif;
        }
        #diary-content h3 {
            color: #e75480;
            margin-bottom: 12px;
            font-size: 16px;
            text-align: center;
        }
        #diary-close-btn {
            display: block;
            margin: 16px auto 0;
            padding: 6px 24px;
            border: none;
            border-radius: 20px;
            background: #e75480;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        #diary-close-btn:hover { background: #d4446a; }
        .chat-time {
            font-size: 10px; color: #999; text-align: center;
            padding: 2px 0;
        }
        /* ===== 打字指示器 ===== */
        #typing-indicator {
            display: none;
            font-size: 11px;
            color: #e75480;
            padding: 2px 8px;
            text-align: left;
            animation: typingPulse 1.2s ease-in-out infinite;
        }
        #typing-indicator.show { display: block; }
        @keyframes typingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ===== 语音VAD电平指示 ===== */
        #vad-indicator {
            display: none;
            position: absolute;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        #vad-indicator.show { display: block; }
        #vad-level {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
            border-radius: 2px;
            transition: width 0.1s;
        }

        /* ===== 快捷回复 ===== */
        #quick-replies {
            display: none;
            gap: 4px;
            padding: 4px 6px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.9);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        #quick-replies.show { display: flex; }
        .quick-reply-btn {
            font-size: 11px;
            padding: 3px 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: white;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-app-region: no-drag;
        }
        .quick-reply-btn:hover {
            background: #fce4ec;
            border-color: #e75480;
            color: #e75480;
        }

        /* ===== 录音时长 ===== */
        #recording-time {
            display: none;
            font-size: 10px;
            color: #ff4444;
            text-align: center;
            padding: 2px 0;
        }
        #recording-time.show { display: block; }

        /* ===== 消息时间戳 ===== */
        .msg-time {
            font-size: 9px;
            color: #bbb;
            display: block;
            margin-top: -1px;
        }
        .msg.user .msg-time { text-align: right; }
        .msg.ai .msg-time { text-align: left; }
    </style>
</head>
<body>
    <div id="pet-container">
        <canvas id="live2d-canvas"></canvas>
        <img id="static-image" alt="pet">
        <img id="placeholder" alt="placeholder">
        <div class="controls">
            <button class="ctrl-btn" id="btn-smaller" title="Smaller">−</button>
            <button class="ctrl-btn" id="btn-bigger" title="Bigger">+</button>
            <button class="ctrl-btn" id="btn-chat-toggle" title="Chat">💬</button>
            <button class="ctrl-btn" id="btn-settings" title="Settings">⚙</button>
            <button class="ctrl-btn" id="btn-close" title="Close">✕</button>
        </div>
        <!-- 聊天框（可拖动 + 多模式） -->
        <div id="chat-overlay" class="mode-companion">
            <div id="chat-drag-handle">
                <span>💬 聊天</span>
                <span class="chat-mode-badge" id="chat-mode-toggle" title="点击切换模式">陪伴模式</span>
                <button id="chat-close-btn">✕</button>
            </div>
            <div id="chat-messages"></div>
            <div id="typing-indicator">💭 正在输入...</div>
            <div id="vad-indicator"><div id="vad-level"></div></div>
            <div id="recording-time">🎤 录音中 <span id="rec-sec">0</span>s</div>
            <div id="quick-replies"></div>
            <div id="chat-input-row">
                <input id="chat-input" type="text" placeholder="说点什么... (Enter发送)" maxlength="500">
                <button class="chat-btn" id="btn-mic" title="语音输入（按住说话）">🎤</button>
                <button class="chat-btn" id="btn-send" title="发送">➤</button>
            </div>
        </div>
        <!-- 日记弹窗 -->
        <div id="diary-popup">
            <div id="diary-content"></div>
        </div>
    </div>

    <script src="libs/live2dcubismcore.min.js"></script>
    <script src="libs/pixi.min.js"></script>
    <script src="libs/cubism4.min.js"></script>
    <script>
        // Forward renderer console to main process (visible without --enable-logging)
        if (window.electronAPI?.rendererLog) {
            const _log = console.log, _warn = console.warn, _error = console.error;
            for (const level of ['log', 'warn', 'error']) {
                const orig = console[level];
                console[level] = (...args) => {
                    orig.apply(console, args);
                    try { window.electronAPI.rendererLog(level, args.map(String)); } catch {}
                };
            }
        }
    </script>
    <script src="src/core/ai-chat.js"></script>
    <script src="src/core/conversation-store.js"></script>
    <script src="src/renderer/model-adapter.js"></script>
    <script>
        const sizePresets = [200, 300, 400, 500];
        let currentSizeIndex = 1;
        let currentAdapter = null;
        let trackX = 0, trackY = 0;

        // ========== Adapter-based Init ==========
        async function initModel() {
            try {
                const config = await window.electronAPI.loadConfig();
                const modelConfig = config.model || { type: 'none' };

                // Resolve model directory for Live2D
                if (modelConfig.type === 'live2d') {
                    const validation = await window.electronAPI.validateModelPaths();
                    if (!validation.valid) {
                        console.warn('[DesktopPet] Model validation failed:', validation.error);
                        modelConfig.type = 'none';
                    } else if (validation.modelDir) {
                        modelConfig._resolvedModelDir = validation.modelDir;
                    }
                }

                currentAdapter = createModelAdapter(modelConfig);
                const container = document.getElementById('pet-container');
                await currentAdapter.load(container);

                if (currentAdapter.getType() === 'live2d') {
                    startMouseTracking();
                }

                console.log('[DesktopPet] Model loaded, type:', currentAdapter.getType());
            } catch (error) {
                console.warn('[DesktopPet] Model load failed, falling back to placeholder:', error);
                currentAdapter = new NullAdapter({});
                await currentAdapter.load(document.getElementById('pet-container'));
            }
        }

        // ========== Mouse Tracking ==========
        let _mouseTrackingId = null;
        function startMouseTracking() {
            if (_mouseTrackingId) clearInterval(_mouseTrackingId);
            _mouseTrackingId = setInterval(async () => {
                if (!window.electronAPI) return;
                try {
                    const cursor = await window.electronAPI.getCursorPosition();
                    const bounds = await window.electronAPI.getWindowBounds();
                    const cx = bounds.x + bounds.width / 2;
                    const cy = bounds.y + bounds.height / 2;
                    trackX = Math.max(-1, Math.min(1, (cursor.x - cx) / 300));
                    trackY = Math.max(-1, Math.min(1, (cursor.y - cy) / 300));
                    if (currentAdapter) {
                        currentAdapter.updateParams(trackX, trackY);
                    }
                } catch (e) {}
            }, 50);
        }

        // ========== Resize ==========
        window.addEventListener('resize', () => {
            if (currentAdapter) {
                currentAdapter.resize(window.innerWidth, window.innerHeight);
            }
        });

        // ========== Controls ==========
        function updateSizeBtns() {
            document.getElementById('btn-smaller').disabled = (currentSizeIndex <= 0);
            document.getElementById('btn-bigger').disabled = (currentSizeIndex >= sizePresets.length - 1);
        }
        updateSizeBtns();

        document.getElementById('btn-smaller').addEventListener('click', () => {
            if (currentSizeIndex <= 0) return;
            currentSizeIndex--;
            const size = sizePresets[currentSizeIndex];
            if (window.electronAPI) window.electronAPI.setWindowSize(size, size);
            updateSizeBtns();
            reportInteraction('resize', 'body', 0, { size });
        });

        document.getElementById('btn-bigger').addEventListener('click', () => {
            if (currentSizeIndex >= sizePresets.length - 1) return;
            currentSizeIndex++;
            const size = sizePresets[currentSizeIndex];
            if (window.electronAPI) window.electronAPI.setWindowSize(size, size);
            updateSizeBtns();
            reportInteraction('resize', 'body', 0, { size });
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
            if (window.electronAPI) window.electronAPI.showSettings();
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            if (window.electronAPI) window.electronAPI.closePetWindow();
        });

        // Right-click context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (window.electronAPI) window.electronAPI.showPetContextMenu();
        });

        // Listen for size changes from context menu
        if (window.electronAPI && window.electronAPI.onSizeChanged) {
            window.electronAPI.onSizeChanged((size) => {
                currentSizeIndex = sizePresets.indexOf(size);
                if (currentSizeIndex < 0) currentSizeIndex = 1;
                updateSizeBtns();
            });
        }

        // ========== Expression System (via Adapter) ==========
        if (window.electronAPI && window.electronAPI.onPlayExpression) {
            window.electronAPI.onPlayExpression((expressionName) => {
                if (currentAdapter) {
                    console.log('[DesktopPet] Playing expression:', expressionName);
                    currentAdapter.setExpression(expressionName);
                }
            });
        }

        if (window.electronAPI && window.electronAPI.onRevertExpression) {
            window.electronAPI.onRevertExpression(() => {
                if (currentAdapter) {
                    console.log('[DesktopPet] Reverting expression');
                    currentAdapter.revertExpression();
                }
            });
        }

        // ========== Motion System (via Adapter) ==========
        if (window.electronAPI && window.electronAPI.onPlayMotion) {
            window.electronAPI.onPlayMotion((group, index) => {
                if (currentAdapter) {
                    console.log(`[DesktopPet] Playing motion: ${group}[${index}]`);
                    currentAdapter.playMotion(group, index);
                }
            });
        }

        // ========== Character Update ==========
        if (window.electronAPI && window.electronAPI.onCharacterUpdate) {
            window.electronAPI.onCharacterUpdate((data) => {
                console.log('[DesktopPet] Character update:', data);
            });
        }

        // ========== Talking State (for Image Adapter) ==========
        if (window.electronAPI && window.electronAPI.onTalkingStateChanged) {
            window.electronAPI.onTalkingStateChanged((isTalking) => {
                // ImageAdapter handles this internally via its own listener
                // This is a fallback in case the adapter registered after the event
            });
        }

        // ========== Model Config Hot-Reload ==========
        if (window.electronAPI && window.electronAPI.onModelConfigUpdate) {
            window.electronAPI.onModelConfigUpdate(async (newConfig) => {
                console.log('[DesktopPet] Model config update, reloading...');
                if (currentAdapter) {
                    currentAdapter.destroy();
                }
                await initModel();
            });
        }

        // ========== Hover Detection ==========
        document.getElementById('pet-container').addEventListener('mouseenter', () => {
            if (window.electronAPI && window.electronAPI.reportHoverState) {
                window.electronAPI.reportHoverState(true);
            }
        });
        document.getElementById('pet-container').addEventListener('mouseleave', () => {
            if (window.electronAPI && window.electronAPI.reportHoverState) {
                window.electronAPI.reportHoverState(false);
            }
        });

        // ========== Interaction Reporting (shared) ==========
        function reportInteraction(type, area, durationMs, extra) {
            console.log(`[DesktopPet] ${type}: area=${area} duration=${durationMs}ms`);
            if (window.electronAPI?.reportHit) {
                window.electronAPI.reportHit({ type, area, durationMs, timestamp: Date.now(), ...extra });
            }
        }

        // ========== Hit Detection + Custom Drag ==========
        // Canvas/image are no-drag; we handle click vs drag manually.
        // Uses screenX/screenY (absolute) to avoid jitter from window movement.
        // On every drag frame, setBounds locks both position AND size to prevent OS resize.
        (function() {
            let downX = 0, downY = 0, downTime = 0, isDragging = false;
            let winX = 0, winY = 0, winW = 0, winH = 0, boundsReady = false;
            const CLICK_THRESHOLD_MS = 300;
            const CLICK_THRESHOLD_PX = 8;

            const SWIPE_COOLDOWN_MS = 3000;
            let lastSwipeTime = 0;

            const targets = ['live2d-canvas', 'static-image'];
            for (const id of targets) {
                const el = document.getElementById(id);
                if (!el) continue;

                el.addEventListener('pointerenter', () => {
                    if (downTime !== 0) return;
                    const now = Date.now();
                    if (now - lastSwipeTime < SWIPE_COOLDOWN_MS) return;
                    lastSwipeTime = now;
                    reportInteraction('swipe', 'body', 0);
                });

                el.addEventListener('pointerdown', (e) => {
                    downX = e.screenX;
                    downY = e.screenY;
                    downTime = Date.now();
                    isDragging = false;
                    boundsReady = false;
                    el.setPointerCapture(e.pointerId);
                    if (window.electronAPI?.getWindowBounds) {
                        window.electronAPI.getWindowBounds().then(b => {
                            winX = b.x; winY = b.y; winW = b.width; winH = b.height;
                            boundsReady = true;
                        }).catch(() => {});
                    }
                });

                el.addEventListener('pointermove', (e) => {
                    if (downTime === 0) return;
                    const dx = e.screenX - downX;
                    const dy = e.screenY - downY;
                    if (!isDragging && (Math.abs(dx) > CLICK_THRESHOLD_PX || Math.abs(dy) > CLICK_THRESHOLD_PX)) {
                        isDragging = true;
                    }
                    if (isDragging && boundsReady && window.electronAPI?.setWindowPosition) {
                        window.electronAPI.setWindowPosition(
                            Math.round(winX + dx), Math.round(winY + dy), winW, winH
                        );
                    }
                });

                el.addEventListener('pointerup', (e) => {
                    const elapsed = Date.now() - downTime;
                    const dx = Math.abs(e.screenX - downX);
                    const dy = Math.abs(e.screenY - downY);
                    downTime = 0;

                    if (isDragging) {
                        reportInteraction('drag', 'body', elapsed);
                    } else if (elapsed < CLICK_THRESHOLD_MS && dx < CLICK_THRESHOLD_PX && dy < CLICK_THRESHOLD_PX) {
                        const area = getHitArea(e.clientX, e.clientY);
                        reportInteraction('click', area, elapsed);
                    } else if (elapsed >= CLICK_THRESHOLD_MS) {
                        const area = getHitArea(e.clientX, e.clientY);
                        reportInteraction('touch', area, elapsed);
                    }
                    isDragging = false;
                });
            }

            function getHitArea(x, y) {
                if (currentAdapter && currentAdapter.getType() === 'live2d' && currentAdapter.model) {
                    try {
                        const areas = currentAdapter.model.hitTest(x, y);
                        if (areas && areas.length > 0) return areas[0];
                    } catch(e) { console.warn('[DesktopPet] hitTest error:', e); }
                }
                return 'body';
            }
        })();

        // ========== 聊天系统（增强版） ==========
        let chatStore = null;
        let isRecording = false;
        let recordingStartTime = 0;
        let recTimer = null;
        let vadAnalyser = null;
        let vadAnimationId = null;

        async function initChat() {
            if (typeof ConversationStore === 'undefined') {
                console.warn('[Chat] ConversationStore not loaded');
                return;
            }
            chatStore = new ConversationStore();
            await chatStore.load();
            window.__chatStore = chatStore;

            // 启动主动回忆
            chatStore.startRecall(async (memory) => {
                // 收到主动回忆时，显示在聊天框
                if (memory && memory.text) {
                    appendMessage('ai', '💭 ' + memory.text + ' (回忆)');
                    if (chatStore) await chatStore.add('assistant', memory.text);
                }
            });

            console.log('[Chat] Store loaded:', chatStore.getStats());
        }

        // ===== 聊天框显示切换 =====
        document.getElementById('btn-chat-toggle').addEventListener('click', () => {
            const overlay = document.getElementById('chat-overlay');
            const btn = document.getElementById('btn-chat-toggle');
            overlay.classList.toggle('show');
            btn.classList.toggle('active');
            if (overlay.classList.contains('show')) {
                document.getElementById('chat-input').focus();
                scrollChat();
                showQuickReplies();
            }
        });

        // ===== 快捷回复 =====
        const QUICK_REPLIES = ['你好呀', '你在干嘛', '好无聊', '讲个笑话', '今天天气', '我饿了', '晚安', '早安'];
        let quickReplyIndex = 0;

        function showQuickReplies() {
            const container = document.getElementById('quick-replies');
            if (!container) return;
            container.innerHTML = '';
            // 随机选4个
            const shuffled = [...QUICK_REPLIES].sort(() => Math.random() - 0.5).slice(0, 4);
            shuffled.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.textContent = text;
                btn.addEventListener('click', () => {
                    sendChatMessage(text);
                    container.classList.remove('show');
                });
                container.appendChild(btn);
            });
            container.classList.add('show');
        }

        // ===== 发送消息（增强版） =====
        let chatAiClient = null;

        async function sendChatMessage(text) {
            if (!text || !text.trim()) return;
            const msg = text.trim();
            document.getElementById('chat-input').value = '';
            document.getElementById('quick-replies').classList.remove('show');

            // 显示用户消息（带时间戳）
            appendMessage('user', msg);
            if (chatStore) await chatStore.add('user', msg);

            // 显示"正在输入"
            showTyping(true);

            try {
                // 初始化 AI 客户端（懒加载）
                if (!chatAiClient) {
                    chatAiClient = new AIChatClient();
                    await chatAiClient.init();
                    window.__chatAiClient = chatAiClient; // 供记忆模块使用
                }

                // ===== 构建增强长期记忆上下文 =====
                let memoryContext = '';
                if (chatStore) {
                    // 使用增强版上下文（含总结+话题+偏好）
                    const enhanced = chatStore.getEnhancedContext(5);
                    if (enhanced) {
                        memoryContext = '\n\n[长期记忆]\n' + enhanced;
                    }
                }

                // 获取当前窗口信息
                let windowInfo = '桌面';
                try {
                    const winResult = await window.electronAPI.getActiveWindow();
                    if (winResult?.success && winResult.data?.title) {
                        windowInfo = winResult.data.title;
                    }
                } catch (e) {}

                const msgs = [
                    {
                        role: 'system',
                        content: `你是一个可爱的桌面宠物「门猫猫」，用活泼简短的方式回答，像朋友一样，每次1-2句话。当前在看「${windowInfo}」。${memoryContext}`
                    },
                    { role: 'user', content: msg }
                ];

                const reply = await chatAiClient.callAPI(msgs);
                showTyping(false);
                appendMessage('ai', reply);
                if (chatStore) await chatStore.add('assistant', reply);

                // 尝试播放语音
                if (window.electronAPI?.ttsSynthesize) {
                    try {
                        const ttsResult = await window.electronAPI.ttsSynthesize(reply);
                        if (ttsResult?.success && ttsResult.wav) {
                            const audio = new Audio('data:audio/wav;base64,' + ttsResult.wav);
                            audio.play().catch(() => {});
                        }
                    } catch (e) {}
                }

                // 回复后重新显示快捷回复
                setTimeout(showQuickReplies, 1000);
            } catch (e) {
                showTyping(false);
                appendMessage('ai', '😅 哎呀，我走神了... ' + e.message);
            }
        }

        // ===== 打字指示器 =====
        function showTyping(show) {
            const el = document.getElementById('typing-indicator');
            if (el) el.classList.toggle('show', show);
        }

        // ===== 提供给 petSystem 的回调 =====
        window.__onChatReply = async function(text) {
            showTyping(false);
            appendMessage('ai', text);
            if (chatStore) await chatStore.add('assistant', text);
        };

        document.getElementById('btn-send').addEventListener('click', () => {
            const input = document.getElementById('chat-input');
            sendChatMessage(input.value);
        });

        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage(e.target.value);
            }
            // Shift+Enter 换行
        });

        // ===== 聊天记录显示（增强版：带时间戳） =====
        function appendMessage(role, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            
            // 消息文本
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(textSpan);
            
            // 时间戳
            const timeSpan = document.createElement('span');
            timeSpan.className = 'msg-time';
            const now = new Date();
            timeSpan.textContent = now.getHours().toString().padStart(2,'0') + ':' + 
                                   now.getMinutes().toString().padStart(2,'0');
            div.appendChild(timeSpan);
            
            container.appendChild(div);
            scrollChat();
        }

        function scrollChat() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        // ===== 语音输入（VAD增强版 - 按住说话/自动检测静音） =====
        // ===== PCM 直接录音（不依赖 WebM 解码） =====
        let pcmBuffer = [];
        let audioCtx = null;
        let scriptNode = null;
        let sourceNode = null;

        async function startRecording() {
            if (isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000
                    } 
                });
                
                // 创建音频上下文（16kHz）
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                await audioCtx.resume();
                sourceNode = audioCtx.createMediaStreamSource(stream);
                
                // VAD分析器
                vadAnalyser = audioCtx.createAnalyser();
                vadAnalyser.fftSize = 256;
                sourceNode.connect(vadAnalyser);

                // ScriptProcessor 直接捕获 PCM
                pcmBuffer = [];
                scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                scriptNode.onaudioprocess = (event) => {
                    if (!isRecording) return;
                    const input = event.inputBuffer.getChannelData(0);
                    // 追加到 PCM 缓冲区
                    for (let i = 0; i < input.length; i++) {
                        pcmBuffer.push(input[i]);
                    }
                };
                sourceNode.connect(scriptNode);
                scriptNode.connect(audioCtx.destination);

                recordingStartTime = Date.now();

                // 停止录音时处理
                const processStop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
                    if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
                    if (audioCtx) { await audioCtx.close(); audioCtx = null; }
                    if (vadAnimationId) { cancelAnimationFrame(vadAnimationId); vadAnimationId = null; }
                    document.getElementById('vad-indicator').classList.remove('show');
                    document.getElementById('recording-time').classList.remove('show');
                    if (recTimer) { clearInterval(recTimer); recTimer = null; }

                    if (pcmBuffer.length < 1600) { // 少于0.1秒不要
                        pcmBuffer = [];
                        return;
                    }
                    
                    const micBtn = document.getElementById('btn-mic');
                    micBtn.textContent = '⋯';
                    
                    try {
                        // 转为 WAV Blob
                        const wavBlob = pcmToWavBlob(pcmBuffer, 16000);
                        pcmBuffer = [];
                        
                        // 先用 Web Speech API
                        let text = await transcribeWithWebSpeech(null);
                        // 再走 Mimo 云端（用 WAV）
                        if (!text) {
                            text = await transcribeWavAudio(wavBlob);
                        }
                        if (text) {
                            document.getElementById('chat-input').value = text;
                            sendChatMessage(text);
                        } else {
                            appendMessage('ai', '😅 没听清楚，能再说一遍吗？');
                        }
                    } catch (e) {
                        appendMessage('ai', '语音识别出错了：' + e.message);
                    }
                    micBtn.textContent = '🎤';
                    pcmBuffer = [];
                };

                // 保存 stop 回调
                window.__sttStopHandler = processStop;

                isRecording = true;
                const micBtn = document.getElementById('btn-mic');
                micBtn.classList.add('listening');
                micBtn.textContent = '🔴';
                
                document.getElementById('vad-indicator').classList.add('show');
                document.getElementById('recording-time').classList.add('show');
                updateVADLevel();
                
                recTimer = setInterval(() => {
                    const sec = Math.floor((Date.now() - recordingStartTime) / 1000);
                    document.getElementById('rec-sec').textContent = sec;
                    if (sec >= 60) stopRecording();
                }, 1000);

            } catch (e) {
                appendMessage('ai', '🎤 麦克风权限被拒绝了：' + e.message);
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            const micBtn = document.getElementById('btn-mic');
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎤';
            // 异步处理停止
            if (window.__sttStopHandler) {
                window.__sttStopHandler().catch(e => console.error('[STT] Stop error:', e));
                window.__sttStopHandler = null;
            }
        }

        // ===== PCM Float32 → WAV Blob =====
        function pcmToWavBlob(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const length = pcmData.length;
            const dataSize = length * 2;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // WAV header
            const writeStr = (offset, str) => {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);           // PCM
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * 2, true);
            view.setUint16(32, numChannels * 2, true);
            view.setUint16(34, bitsPerSample, true);
            writeStr(36, 'data');
            view.setUint32(40, dataSize, true);

            // PCM data
            const pcmView = new Int16Array(buffer, 44, length);
            for (let i = 0; i < length; i++) {
                const s = Math.max(-1, Math.min(1, pcmData[i]));
                pcmView[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        function updateVADLevel() {
            if (!vadAnalyser || !isRecording) return;
            const data = new Uint8Array(vadAnalyser.frequencyBinCount);
            vadAnalyser.getByteTimeDomainData(data);
            
            // 计算音量级别
            let sum = 0;
            for (let i = 0; i < data.length; i++) {
                sum += Math.abs(data[i] - 128);
            }
            const level = Math.min(100, (sum / data.length) * 2);
            
            document.getElementById('vad-level').style.width = level + '%';
            
            vadAnimationId = requestAnimationFrame(updateVADLevel);
        }

        // ===== 语音按钮（支持按住说话/点击切换） =====
        const micBtn = document.getElementById('btn-mic');
        
        // 鼠标按下开始录音
        micBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            startRecording();
        });
        
        // 鼠标松开停止录音
        micBtn.addEventListener('mouseup', (e) => {
            e.preventDefault();
            if (isRecording) stopRecording();
        });
        
        micBtn.addEventListener('mouseleave', () => {
            if (isRecording) stopRecording();
        });

        // 触摸支持
        micBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        
        micBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isRecording) stopRecording();
        });

        // ===== Web Speech API 本地语音识别（内置在 Electron 中，无需网络） =====
        async function transcribeWithWebSpeech(audioBlob) {
            // 检查浏览器是否支持
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.log('[STT] Web Speech API not available');
                return '';
            }

            return new Promise((resolve) => {
                try {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'zh-CN';
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;

                    // 超时处理
                    const timeout = setTimeout(() => {
                        recognition.abort();
                        resolve('');
                    }, 10000);

                    recognition.onresult = (event) => {
                        clearTimeout(timeout);
                        const text = event.results[0][0].transcript;
                        if (text && text.trim()) {
                            console.log('[STT] WebSpeech result:', text);
                            resolve(text.trim());
                        } else {
                            resolve('');
                        }
                    };

                    recognition.onerror = (event) => {
                        clearTimeout(timeout);
                        console.log('[STT] WebSpeech error:', event.error);
                        resolve('');  // 返回空，让代码走 Mimo 云端
                    };

                    recognition.onend = () => {
                        clearTimeout(timeout);
                    };

                    recognition.start();
                } catch (e) {
                    console.log('[STT] WebSpeech exception:', e.message);
                    resolve('');
                }
            });
        }

        // ===== 调用 Mimo API 进行语音识别（新版 chat/completions 接口） =====
        async function transcribeWavAudio(wavBlob) {
            const config = await window.electronAPI.loadConfig();
            const sttConfig = config.stt || {};
            const baseURL = (sttConfig.baseURL || 'https://api.xiaomimimo.com/v1').replace(/\/audio\/transcriptions$/, '');
            const apiKey = sttConfig.apiKey || '';
            const model = sttConfig.model || 'mimo-v2.5-asr';
            const language = sttConfig.language || 'zh';

            // webm → wav 转 base64
            // wavBlob 已经是 WAV 格式了，直接用
            const buffer = await wavBlob.arrayBuffer();
            // 分块编码，避免 Maximum call stack size exceeded
            const bytes = new Uint8Array(buffer);
            const chunkSize = 8192;
            let binary = '';
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, Math.min(i + chunkSize, bytes.length));
                binary += String.fromCharCode.apply(null, chunk);
            }
            const base64 = btoa(binary);
            const audioDataUrl = 'data:audio/wav;base64,' + base64;

            const requestBody = JSON.stringify({
                model: model,
                messages: [{
                    role: 'user',
                    content: [{
                        type: 'input_audio',
                        input_audio: { data: audioDataUrl }
                    }]
                }],
                asr_options: { language: language }
            });

            const response = await fetch(baseURL.replace(/\/$/, '') + '/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + apiKey,
                    'Content-Type': 'application/json'
                },
                body: requestBody,
                timeout: 30000
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error('STT ' + response.status + ': ' + errText);
            }

            const result = await response.json();
            const text = result?.choices?.[0]?.message?.content;
            return text ? text.trim() : '';
        }



        // ===== 聊天框拖动 + 模式切换 + 日记 =====
        let chatMode = 'companion'; // 'companion' | 'tavern'
        let diaryStore = null;      // 酒馆模式的独立记忆

        // 聊天框拖动
        (function() {
            const overlay = document.getElementById('chat-overlay');
            const handle = document.getElementById('chat-drag-handle');
            if (!overlay || !handle) return;
            let isDragging = false, startX, startY, origX, origY;
            
            handle.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('chat-mode-badge') || e.target.id === 'chat-close-btn') return;
                isDragging = true;
                const rect = overlay.getBoundingClientRect();
                startX = e.clientX; startY = e.clientY;
                origX = rect.left; origY = rect.top;
                overlay.style.left = origX + 'px';
                overlay.style.top = origY + 'px';
                overlay.style.position = 'fixed';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                overlay.style.left = (origX + e.clientX - startX) + 'px';
                overlay.style.top = (origY + e.clientY - startY) + 'px';
            });
            
            document.addEventListener('mouseup', () => { isDragging = false; });
        })();

        // 关闭聊天框
        document.getElementById('chat-close-btn')?.addEventListener('click', () => {
            document.getElementById('chat-overlay').classList.remove('show');
            document.getElementById('btn-chat-toggle').classList.remove('active');
        });

        // 模式切换
        document.getElementById('chat-mode-toggle')?.addEventListener('click', async () => {
            const overlay = document.getElementById('chat-overlay');
            const badge = document.getElementById('chat-mode-toggle');
            const messages = document.getElementById('chat-messages');
            
            if (chatMode === 'companion') {
                // 切换到酒馆模式
                chatMode = 'tavern';
                overlay.className = 'mode-tavern show';
                badge.textContent = '🏰 酒馆模式';
                messages.innerHTML = ''; // 清空聊天显示
                
                // 加载酒馆独立记忆
                if (!diaryStore && typeof ConversationStore !== 'undefined') {
                    diaryStore = new ConversationStore();
                    diaryStore.maxEntries = 100;
                    // 用不同的存储 key
                    diaryStore._saveKey = 'tavernHistory';
                    await diaryStore.load();
                    // 加载历史消息到界面
                    const recent = diaryStore.history.slice(-20);
                    for (const msg of recent) {
                        appendMessage(msg.role, msg.content);
                    }
                    // 显示上次的日记摘要
                    if (diaryStore.summaries.length > 0) {
                        const lastSummary = diaryStore.summaries[diaryStore.summaries.length - 1];
                        appendMessage('ai', '📜 上次冒险的日记：' + lastSummary.summary.slice(0, 100));
                    }
                }
                appendMessage('ai', '🏰 欢迎来到酒馆！在这里你就是冒险者，我是酒馆老板。有什么需要帮忙的吗？');
            } else {
                // 切回陪伴模式
                chatMode = 'companion';
                overlay.className = 'mode-companion show';
                badge.textContent = '陪伴模式';
                messages.innerHTML = '';
                // 重新加载陪伴模式的对话
                if (window.__chatStore) {
                    const recent = window.__chatStore.history.slice(-20);
                    for (const msg of recent) {
                        appendMessage(msg.role, msg.content);
                    }
                }
                appendMessage('ai', '我回来啦~ 刚才去酒馆转了一圈！');
            }
            
            // 存模式到配置
            if (window.electronAPI) {
                window.electronAPI.saveConfig({ appMode: chatMode });
            }
        });

        // ===== 日记生成（酒馆模式退出时） =====
        async function generateDiary() {
            if (chatMode !== 'tavern' || !diaryStore || diaryStore.history.length < 4) return;
            try {
                // 用 AI 生成日记
                if (!chatAiClient) {
                    chatAiClient = new AIChatClient();
                    await chatAiClient.init();
                }
                const recentChat = diaryStore.history.slice(-20).map(m =>
                    (m.role === 'user' ? '冒险者' : '酒馆老板') + ': ' + m.content
                ).join('\n');
                
                const diaryPrompt = '你是一个酒馆老板，请用第一人称写一篇简短的冒险日记（100字左右），记录今天和冒险者的对话。风格要像奇幻小说的日记。对话如下：\n' + recentChat;
                
                const diary = await chatAiClient.callAPI([
                    { role: 'system', content: '你是一个奇幻酒馆的老板，喜欢写日记记录每天遇到的冒险者。请用中文回应。' },
                    { role: 'user', content: diaryPrompt }
                ]);
                
                if (diary) {
                    // 存进酒馆记忆
                    diaryStore.add('assistant', '[日记] ' + diary);
                    
                    // 弹出日记
                    const popup = document.getElementById('diary-popup');
                    const content = document.getElementById('diary-content');
                    content.innerHTML = '<h3>📜 冒险日记</h3><p>' + diary.replace(/\n/g, '<br>') + '</p><button id="diary-close-btn">已阅</button>';
                    popup.classList.add('show');
                    document.getElementById('diary-close-btn').addEventListener('click', () => {
                        popup.classList.remove('show');
                    });
                }
            } catch (e) {
                console.warn('[Diary] 生成失败:', e.message);
            }
        }

        // 拦截聊天框关闭/模式切换来触发日记
        const origSendChat = window.sendChatMessage;
        // 重写发送消息以支持模式
        const origSendFn = sendChatMessage;
        window.sendChatMessage = async function(text) {
            if (chatMode === 'tavern' && diaryStore) {
                // 酒馆模式用自己的记忆
                const msg = text.trim();
                if (!msg) return;
                appendMessage('user', msg);
                await diaryStore.add('user', msg);
                showTyping(true);
                try {
                    if (!chatAiClient) {
                        chatAiClient = new AIChatClient();
                        await chatAiClient.init();
                    }
                    const ctx = diaryStore.getEnhancedContext(5);
                    const msgs = [
                        { role: 'system', content: '你是酒馆老板，一个神秘的奇幻世界酒馆的主人。用活泼、神秘、简短的方式回应冒险者，每次1-2句话。\n\n[酒馆记忆]\n' + ctx },
                        { role: 'user', content: msg }
                    ];
                    const reply = await chatAiClient.callAPI(msgs);
                    showTyping(false);
                    appendMessage('ai', reply);
                    await diaryStore.add('assistant', reply);
                    if (window.electronAPI?.ttsSynthesize) {
                        try {
                            const tts = await window.electronAPI.ttsSynthesize(reply);
                            if (tts?.success) new Audio('data:audio/wav;base64,' + tts.wav).play().catch(() => {});
                        } catch(e) {}
                    }
                } catch(e) {
                    showTyping(false);
                    appendMessage('ai', '😅 酒馆今天有点忙... ' + e.message);
                }
                return;
            }
            // 陪伴模式走原来的逻辑
            return origSendFn(text);
        };

        // ===== 初始化聊天 =====
        initChat();

        // 加载保存的模式
        (async () => {
            try {
                if (window.electronAPI) {
                    const cfg = await window.electronAPI.loadConfig();
                    if (cfg.appMode === 'tavern') {
                        chatMode = 'tavern';
                        // 但不自动切换，让用户手动切换
                    }
                }
            } catch(e) {}
        })();

        // ========== Init ==========
        initModel();
        console.log('[DesktopPet] Window loaded');
    </script>
